<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app"></div>
    <script type="text/javascript">
        // Select the div element with 'app' id
        // Selecione o elemento div com o id 'app'
        const app = document.getElementById('app');

        // Create a new H1 element
        // Crie um novo elemento H1
        const header = document.createElement('h1');
        
        // Create a new text node for the H1 element
        // Crie um novo nó de texto para o elemento H1
        const text = 'Desenvolver. Visualizar. Enviar.';
        
        const headercontent = document.createTextNode(text);

        // Append the text to the H1 element 
        // Anexe o texto ao elemento H1
        header.appendChild(headercontent);

        // Place the H1 element inside the div
        // Coloque o elemento H1 dentro da div
        app.appendChild(header);
    </script>
</body>
</html>
